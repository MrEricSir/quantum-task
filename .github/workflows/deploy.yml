name: CI / Deploy

# Runs on every push and PR against main.
# Tests always run. Deployment only happens on push to main (not PRs).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  GCP_SERVICE_NAME: todo-backend
  GCP_AR_REPO: todo

jobs:
  # ── Backend unit tests ───────────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt \
                      -r backend/requirements-dev.txt

      - name: Run calendar unit tests
        run: cd backend && python -m pytest test_calendar.py -v
        # Note: test_parse.py requires a live Ollama instance and is intentionally
        # skipped in CI. It can be run locally with: ./dev.sh test

  # ── Frontend build verification ──────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: cd frontend && npm ci && npm run build

      # Upload the built dist/ so deploy-frontend can use it without rebuilding
      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Docker build verification (PRs only — deploy does its own push build) ────
  build-docker:
    name: Verify Docker build
    runs-on: ubuntu-latest
    # Only run on PRs; on push to main the deploy job builds and pushes directly.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build ./backend -t todo-backend:ci --quiet

  # ── Deploy backend to Cloud Run ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/todo/backend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            --tag "$IMAGE:${{ github.sha }}" \
            --tag "$IMAGE:latest" \
            ./backend
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.GCP_SERVICE_NAME }} \
            --image "$IMAGE:${{ github.sha }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --quiet

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.GCP_SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format 'value(status.url)'

  # ── Deploy frontend to Firebase Hosting ──────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.GCP_PROJECT_ID }}
          channelId: live
