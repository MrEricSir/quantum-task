<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07040f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QuantumTask" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- iPhone SE 2nd/3rd gen (375×667 @2x) -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/iphone-se.png" />
    <!-- iPhone 12 mini / 13 mini (375×812 @3x) -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/iphone-12mini.png" />
    <!-- iPhone 12 / 13 / 14 / 15 (390×844 @3x) -->
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/iphone-12.png" />
    <!-- iPhone 14 Plus / 15 Plus (428×926 @3x) -->
    <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/iphone-14plus.png" />
    <!-- iPhone 14 Pro / 15 Pro (393×852 @3x) -->
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/iphone-14pro.png" />
    <!-- iPhone 14 Pro Max / 15 Pro Max (430×932 @3x) -->
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/iphone-14promax.png" />
    <title>Quantum Task</title>
    <style>
      #qt-splash {
        position: fixed;
        inset: 0;
        background: #07040f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #qt-splash.qt-splash--out { opacity: 0; pointer-events: none; }
      #qt-splash img { width: 72px; height: 72px; }
      #qt-splash p {
        margin: 0;
        color: #e2d8f5;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      #qt-splash-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(167,139,250,0.2);
        border-top-color: #a78bfa;
        border-radius: 50%;
        animation: qt-spin 0.8s linear infinite;
      }
      @keyframes qt-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="qt-splash">
      <img src="/logo.svg" alt="" aria-hidden="true" />
      <p>Quantum Task</p>
      <div id="qt-splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
